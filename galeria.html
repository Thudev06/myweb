<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Galería - Vásquez Soluciones Constructivas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Galería de trabajos</h1>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="galeria.html">Galería</a>
        <a href="contacto.html">Contacto</a>
    </nav>
</header>

<section class="galeria">
<img src="images/imagen1.jpg"
onclick="abrirPopup(this.src, 'REFORMA COMPLETA', 'Se renovó toda la vivienda incluyendo cocina, baño y pintura.')">

<img src="images/imagen2.jpg"
onclick="abrirPopup(this.src, 'CASA MODERNA', 'Construcción desde cero con diseño moderno y materiales premium.')">

<img src="images/imagen3.jpg"
onclick="abrirPopup(this.src, 'ALBAÑILERÍA', 'Reparación estructural y acabados profesionales.')">
</section>
<div id="popup" class="popup">
    <div class="popup-box">
        <span class="cerrar" onclick="cerrarPopup()">×</span>

        <div class="popup-content">
            <img id="popup-img">

            <div class="popup-texto">
                <h2 id="popup-titulo"></h2>
                <p id="popup-desc"></p>
            </div>
        </div>
    </div>
</div>

<script>
function abrirPopup(src, titulo, descripcion) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("popup-img").src = src;
    document.getElementById("popup-titulo").innerText = titulo;
    document.getElementById("popup-desc").innerText = descripcion;
}

function cerrarPopup() {
    document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
